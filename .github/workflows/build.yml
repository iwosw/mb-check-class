name: CI Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Forge build (assemble + check, no publishing)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Cache ForgeGradle / Minecraft assets
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/forge_gradle
            ~/.gradle/caches/minecraft
          key: forgegradle-${{ runner.os }}-mc${{ hashFiles('gradle.properties') }}
          restore-keys: |
            forgegradle-${{ runner.os }}-

      - name: Build
        run: ./gradlew build --stacktrace --warning-mode=summary
