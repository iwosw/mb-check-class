name: CI Build

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-build-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Forge build (assemble + check, no publishing)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Cache ForgeGradle / Minecraft assets
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/forge_gradle
            ~/.gradle/caches/minecraft
          key: forgegradle-${{ runner.os }}-mc${{ hashFiles('gradle.properties') }}
          restore-keys: |
            forgegradle-${{ runner.os }}-

      - name: Unit tests and coverage
        run: ./gradlew -Dnet.minecraftforge.gradle.check.certs=false test jacocoTestCoverageVerification --stacktrace --warning-mode=summary

      - name: GameTest scenario coverage
        run: ./gradlew -Dnet.minecraftforge.gradle.check.certs=false compileGametestJava verifyGameTestScenarioCoverage --stacktrace --warning-mode=summary

      - name: GameTest runtime
        run: ./gradlew -Dnet.minecraftforge.gradle.check.certs=false runGameTestServer --stacktrace --warning-mode=summary

      - name: Build
        run: ./gradlew clean verifyBuildStage --stacktrace --warning-mode=summary

      - name: Publish release JARs
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/bannermod-${{ github.ref_name }}.jar
          overwrite_files: true
